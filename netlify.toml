[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# News proxy. Functions v2 also binds /api/news via config.path; this redirect
# is a belt-and-braces fallback and must precede the SPA catch-all.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
